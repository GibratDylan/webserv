root ./www;
index index.html index.htm;
autoindex off;
client_max_body_size 10k;
large_client_header_buffers 8192g;
client_header_buffer_size 10m;
# max_connections 1000;

server {
    listen 127.0.0.1:8080;
    root ./www/8080;
    
    index index.html index.htm;
    autoindex on;
    client_max_body_size 10000000;
    
    error_page 404 /error/page404.html;
    error_page 403 /error/page403.html;
   
    upload_store ./www/uploads;
    
    location /files/ {
        root ./www/8080/files;
        autoindex on;
    }

    location /cgi-bin {
        root ./www/8080/cgi-bin;
        autoindex on;
        cgi /usr/bin/python3;
    }
}

server {
    listen 127.0.0.1:9090;
    root ./www/9090;
    
    index index.html;
    autoindex off;
    client_max_body_size 10000000;
    
    error_page 404 /error/page404.html;
    
    return 301 http://localhost:8080/;
    
}

server {
    listen 127.0.0.1:8888;
    root ./www/8888;
    
    index index.html;
    autoindex on;
    client_max_body_size 10000000;
        return 200 "POST body received";
    
    location /post_body {
        root ./www/8888/post_body;
        client_max_body_size 100;
    }

    location /directory {
        root ./www/8888/YoupiBanane;
        index youpi.bad_extension;    
        autoindex on;
        cgi /usr/bin/python3;
    }

}
