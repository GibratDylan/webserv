# Fichier de configuration avec commentaires
# Configuration globale
root ./var/www/html;
index index.html;
# Activer l'autoindex
autoindex on;

# Premier serveur
server {
	# Port d'écoute
	listen 127.0.0.1:8080;
	# Racine du serveur
	root ./var/www/server;
	# Fichiers index
	index index.html index.htm;
	
	# Location pour le dossier public
	location /public/ {
		root ./var/www/public;
		# Désactiver l'autoindex ici
		autoindex off;
	}
}

# Deuxième serveur sur un autre port
server {
	listen 8081;
	root ./var/www/server2;
}
