server {
    listen 127.0.0.1:8888;
    server_name localhost;

    root /home/adv/.ssh/42/ws2/www/8888;
    index index.html index.htm;

    autoindex on;

    # Matches default.conf intent
    client_max_body_size 200m;
    client_header_buffer_size 1m;
    large_client_header_buffers 4 256k;
    keepalive_timeout 3600s;

    # Equivalent of allow_methods GET: return 405 for other methods
    location / {
        if ($request_method != GET) {
            add_header Allow "GET" always;
            return 405;
        }
        try_files $uri $uri/ =404;
    }

    # default.conf has: location /post_body FILE + allow_methods POST + body size 100
    # Nginx does not support custom upload_store behavior out of the box for POST.
    location = /post_body {
        limit_except POST {
            deny all;
        }
        client_max_body_size 100;
        return 204;
    }

    # Run cgi_tester for .bla under /directory
    location ~ ^/directory/(.*\.bla)$ {
        include fastcgi_params;
        set $bla_target /home/adv/.ssh/42/ws2/www/8888/YoupiBanane/$1;
        fastcgi_param SCRIPT_FILENAME /home/adv/.ssh/42/ws2/cgi_tester_runner.sh;
        fastcgi_param SCRIPT_NAME $uri;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param PATH_TRANSLATED $bla_target;
        fastcgi_param BLA_TARGET $bla_target;
        fastcgi_param DOCUMENT_ROOT /home/adv/.ssh/42/ws2;
        fastcgi_param REQUEST_URI $uri$is_args$args;
        fastcgi_send_timeout 600s;
        fastcgi_read_timeout 600s;
        fastcgi_pass unix:/run/fcgiwrap.socket;
    }

    # Static files/dirs under /directory
    location /directory {
        alias /home/adv/.ssh/42/ws2/www/8888/YoupiBanane/;
        index youpi.bad_extension;
        autoindex on;
    }

    # Explicit returns from current config
    location = /directory/Yeah {
        default_type text/plain;
        return 404 "lol";
    }

    location = /directory/Yeah/not_happy.bad_extension {
        default_type text/plain;
        return 200 "lol";
    }

    # NOTE: .bla CGI is handled through fcgiwrap by executing cgi_tester directly.
}
