# Test-only configuration
root ./www;
autoindex off;
# Default buffers are big; keep normal requests working, but allow tests to exceed them.
large_client_header_buffers 64;
client_header_buffer_size 2048;
max_connections 200;
session_timeout 3600;

server {
    listen 8080;

    root ./www/8080;
    index index.html;
    autoindex off;

    allow_methods GET POST DELETE;
    client_max_body_size 10000000;
    upload_store ./www/8080/uploads;

    # Exercise built-in error pages as well
    error_page 404 ./404.html;

    # CGI
    cgi /usr/bin/python3;
    cgi /usr/bin/cat .cat;
    cgi /usr/bin/false .false;

    location /files {
        root ./www/8080/files;
        autoindex on;
        index index.html;
    }

    # Directory with autoindex disabled and no index => 403
    location /noauto {
        root ./www/8080/noauto;
        autoindex off;
        index index.html;
    }

    # Limit body size for 413 tests
    location /small {
        client_max_body_size 4;
        upload_store ./www/8080/uploads;
        allow_methods POST;
    }

    location /redirect {
        return 301 /;
    }
}
