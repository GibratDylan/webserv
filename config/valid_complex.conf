# Configuration complexe valide
root /var/www/html;
index index.html index.htm;
error_page 404 /errors/404.html;
autoindex on;
client_max_body_size 10M;

server {
	listen 80;
	root /var/www/example;
	index index.html index.htm default.html;
	error_page 404 /404.html;
	error_page 500 502 503 /50x.html;
	autoindex off;
	client_max_body_size 5M;

	location / {
		root /var/www/example/public;
		autoindex on;
		client_max_body_size 2M;
		index index.html index.htm;
		error_page 403 /errors/403.html;
		limit_except GET POST;
		upload_store /var/www/uploads;
		return 301 https://example.com;
	}

	location /api/ {
		root /var/www/example/api;
		autoindex off;
		limit_except GET POST DELETE;
		client_max_body_size 1M;
	}

	location /static/ {
		root /var/www/static;
		autoindex on;
		index index.html;
	}
}

server {
	listen 81;
	root /var/www/server2;
	index index.html;
	client_max_body_size 20M;
	error_page 500 502 503 504 /50x.html;
	autoindex on;
}

server {
	listen 443;
	root /var/www/secure;
	index index.html index.htm;
	client_max_body_size 50M;
	error_page 404 /404.html;

	location /admin/ {
		limit_except GET POST DELETE;
		upload_store /var/www/secure/admin/uploads;
		return 200;
		root /var/www/secure/admin;
		autoindex off;
		error_page 403 /admin/forbidden.html;
	}

	location /public/ {
		root /var/www/secure/public;
		autoindex off;
		index main.html;
		client_max_body_size 15M;
	}
}
