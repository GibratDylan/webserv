root /var/www/html;

index index.html index.htm index.php;

error_page 404 /errors/404.html;

autoindex on;

client_max_body_size 10M;

# Serveur 1
server {
	listen 80;

	server_name example.com www.example.com;

	root /var/www/example;

	index index.html index.htm default.html;

	error_page 404 /404.html;

	autoindex off;

	client_max_body_size 5M;

	cgi_handler .php /usr/bin/php-cgi;

	location / {

		root /var/www/example/public;

		autoindex on;

		client_max_body_size 2M;

		index index.html index.htm;

		error_page 403 /errors/403.html;

		cgi_handler .py /usr/bin/python3;

		limit_except GET POST;

		upload_store /var/www/uploads;

		return 301 https://example.com$request_uri;

	}

	location /www/ {
		root /var/www/static;
		autoindex on;
		index index.html;
	}
}

# Serveur 2
server {
	listen 81;
	server_name localhost;
	root /var/www/server2;
	index index.html;
	client_max_body_size 20M;
	error_page 500 502 503 504 /50x.html;
	autoindex on;
}

# Serveur HTTPS
server {
	listen 443;
	server_name secure.example.com;
	root /var/www/secure;
	index index.html index.htm;
	client_max_body_size 50M;
	error_page 404 /404.html;

	location /www/ {
		root /var/www/secure/public;
		autoindex off;
		index main.html;
		client_max_body_size 15M;
	}

	location /admin/ {
		limit_except GET POST DELETE;

		upload_store /var/www/secure/admin/uploads;

		return 200;

		root /var/www/secure/admin;
		autoindex off;
		cgi_handler .cgi /usr/bin/perl;
		error_page 403 /admin/forbidden.html;
	}
}
