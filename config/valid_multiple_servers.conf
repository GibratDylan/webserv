# Configuration avec plusieurs serveurs
root /var/www;
index index.html;

server {
	listen 8080;
	root /var/www/server1;
	autoindex on;
	
	location / {
		root /var/www/server1/public;
		index index.html;
		autoindex off;
	}
	
	location /api/ {
		root /var/www/server1/api;
		limit_except GET POST;
	}
}

server {
	listen 8081;
	root /var/www/server2;
	client_max_body_size 5M;
	
	location /uploads/ {
		upload_store /var/www/uploads;
		limit_except POST;
	}
}

server {
	listen 8082;
	root /var/www/server3;
	error_page 404 /errors/404.html;
}
